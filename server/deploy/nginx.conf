# ──────────────────────────────────────────────────────────
# Nginx Reverse Proxy — Coastal Innovation Summit Backend
# ──────────────────────────────────────────────────────────
#
# ARCHITECTURE: Cloudflare → Nginx → Node.js (PM2)
#
# Cloudflare handles:
#   - Global CDN / edge caching
#   - DDoS mitigation (L3/L4/L7)
#   - SSL termination (if using Cloudflare proxy)
#   - HTTP/2 + HTTP/3 (QUIC)
#
# Nginx handles:
#   - Reverse proxy to Node.js
#   - Rate limiting (second layer behind Cloudflare)
#   - Gzip compression
#   - Real IP restoration from Cloudflare
#   - Connection pooling to backend
#
# Installation:
#   sudo cp nginx.conf /etc/nginx/sites-available/cis-backend
#   sudo ln -s /etc/nginx/sites-available/cis-backend /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# SSL (Let's Encrypt):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d yourdomain.com
# ──────────────────────────────────────────────────────────

# ── Worker tuning (1000 concurrent users) ──
# worker_processes auto;  ← Set in /etc/nginx/nginx.conf (not per-site)
# worker_connections 2048; ← Set in events block of /etc/nginx/nginx.conf

# ── Cloudflare Real IP Restoration ──
# Without this, ALL requests appear from Cloudflare IPs,
# breaking rate limiting and logging.
# Source: https://www.cloudflare.com/ips/

# Cloudflare IPv4 ranges
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;

# Cloudflare IPv6 ranges
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

# Use CF-Connecting-IP header (most reliable — set by Cloudflare)
real_ip_header CF-Connecting-IP;

# Rate limiting zone (extra layer on top of Express rate limiter)
# Now correctly uses the REAL client IP thanks to set_real_ip_from
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream cis_backend {
    server 127.0.0.1:5000;
    keepalive 16;              # increased from 8 → 16 for 1000 concurrent users
}

server {
    listen 80;
    server_name yourdomain.com;  # ← CHANGE THIS

    # Redirect HTTP to HTTPS (uncomment after certbot)
    # return 301 https://$host$request_uri;

    # ── Proxy to Node.js ──
    location /api/ {
        # Rate limit: 10 req/s with burst of 30 (increased from 20)
        limit_req zone=api burst=30 nodelay;

        proxy_pass http://cis_backend;
        proxy_http_version 1.1;

        # Headers — pass real client info to Express
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts — tuned for payment/webhook flows
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering — optimised for JSON API responses
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
    }

    # ── Webhook gets special treatment: higher timeout, no rate limit ──
    location = /api/payment/webhook {
        proxy_pass http://cis_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # ── Health check — no rate limit, fast path ──
    location = /api/health {
        proxy_pass http://cis_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ── Security headers (Nginx level) ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # ── Gzip — complements Cloudflare's compression ──
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types application/json text/plain text/css application/javascript;

    # ── Block common attack paths ──
    location ~ /\. { deny all; }
    location ~ /(wp-admin|wp-login|xmlrpc|phpmyadmin) { return 444; }

    # ── Max body size (matches Express 10kb limit) ──
    client_max_body_size 16k;

    # ── Connection tuning for high concurrency ──
    keepalive_timeout 65;
    keepalive_requests 1000;
}

