# ──────────────────────────────────────────────────────────
# Nginx Reverse Proxy — Coastal Innovation Summit Backend
# ──────────────────────────────────────────────────────────
#
# Installation:
#   sudo cp nginx.conf /etc/nginx/sites-available/cis-backend
#   sudo ln -s /etc/nginx/sites-available/cis-backend /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# SSL (Let's Encrypt):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d yourdomain.com
# ──────────────────────────────────────────────────────────

# Rate limiting zone (extra layer on top of Express rate limiter)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream cis_backend {
    server 127.0.0.1:5000;
    keepalive 8;
}

server {
    listen 80;
    server_name yourdomain.com;  # ← CHANGE THIS

    # Redirect HTTP to HTTPS (uncomment after certbot)
    # return 301 https://$host$request_uri;

    # ── Proxy to Node.js ──
    location /api/ {
        # Rate limit: 10 req/s with burst of 20
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://cis_backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ── Webhook gets special treatment: higher timeout, no rate limit ──
    location = /api/payment/webhook {
        proxy_pass http://cis_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # ── Security headers (Nginx level) ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types application/json text/plain text/css application/javascript;

    # ── Block common attack paths ──
    location ~ /\. { deny all; }
    location ~ /(wp-admin|wp-login|xmlrpc|phpmyadmin) { return 444; }

    # ── Max body size (matches Express 10kb limit) ──
    client_max_body_size 16k;
}

